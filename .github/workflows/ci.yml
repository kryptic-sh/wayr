name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: false
      - run: rustup update --no-self-update stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wayr-lint

      # Wayland headers + xkbcommon land here once #4 (connection) +
      # #10 (keyboard) pull them in as build deps. Today wayr has no
      # native deps; the install step is a no-op placeholder so future
      # changes land in one place.
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wayr-test

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: cargo build (default features)
        run: cargo build --workspace --all-targets

      - name: cargo build (all features)
        run: cargo build --workspace --all-targets --all-features

      - name: cargo test
        run: cargo test --workspace --all-features --no-fail-fast

      - name: cargo test (doctests)
        run: cargo test --workspace --all-features --doc

  e2e:
    name: e2e (headless sway)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wayr-e2e

      - name: install system deps + sway
        # Ubuntu 24.04 ships sway 1.9 (wlroots 0.17) with the
        # headless backend. Mesa software rendering is fine for
        # protocol-level tests — wlroots' renderer requires
        # *something* available even on headless surfaces.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            sway \
            mesa-vulkan-drivers

      - name: run e2e suite under headless sway
        # tests/run-e2e.sh starts sway with WLR_BACKENDS=headless
        # in a private XDG_RUNTIME_DIR, waits for the wayland-N
        # socket, then `cargo test --include-ignored`. Tests stay
        # marked `#[ignore]` for the standard local cargo test
        # path; only this job flips them on.
        run: tests/run-e2e.sh
