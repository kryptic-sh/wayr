name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: false
      - run: rustup update --no-self-update stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wayr-lint

      # Wayland headers + xkbcommon land here once #4 (connection) +
      # #10 (keyboard) pull them in as build deps. Today wayr has no
      # native deps; the install step is a no-op placeholder so future
      # changes land in one place.
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wayr-test

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: cargo build (default features)
        run: cargo build --workspace --all-targets

      - name: cargo build (all features)
        run: cargo build --workspace --all-targets --all-features

      - name: cargo test
        run: cargo test --workspace --all-features --no-fail-fast

      - name: cargo test (doctests)
        run: cargo test --workspace --all-features --doc

      - name: cargo build --examples
        # Examples pull in wgpu and prove the raw-window-handle wiring
        # end-to-end; CI just verifies they compile (no GPU here).
        run: cargo build --workspace --examples --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  e2e:
    name: e2e (headless sway)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - run: rustup update --no-self-update stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wayr-e2e

      - name: install system deps + sway
        # Ubuntu 24.04 ships sway 1.9 (wlroots 0.17) with the
        # headless backend. Mesa software rendering is fine for
        # protocol-level tests — wlroots' renderer requires
        # *something* available even on headless surfaces.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            sway \
            mesa-vulkan-drivers

      - name: run e2e suite under headless sway
        # tests/run-e2e.sh starts sway with WLR_BACKENDS=headless
        # in a private XDG_RUNTIME_DIR, waits for the wayland-N
        # socket, then `cargo test --include-ignored`. Tests stay
        # marked `#[ignore]` for the standard local cargo test
        # path; only this job flips them on.
        run: tests/run-e2e.sh

  publish-crates:
    name: Publish to crates.io
    needs: [lint, test, deny, e2e]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "v$CARGO_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match Cargo.toml version v$CARGO_VER"
            exit 1
          fi

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wayr-publish

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Publish wayr to crates.io (idempotent)
        # crates.io publishes are append-only — a re-run after a partial
        # CI failure must skip if the version is already on the registry,
        # otherwise `cargo publish` aborts with "crate already exists".
        # The HTTP probe is the same shape sqeel + hjkl use.
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          URL="https://crates.io/api/v1/crates/wayr/${VERSION}"
          if curl -fsS -A "wayr-release-ci" -o /dev/null "$URL"; then
            echo "::notice::wayr@${VERSION} already on crates.io, skipping"
            exit 0
          fi
          cargo publish -p wayr --locked
