# Minimal sway config for headless e2e tests.
#
# We never see this window manager — sway runs on the wlroots
# `headless` backend with no real outputs and no real inputs. The
# config exists only because sway refuses to start without one.

# Single virtual output sized to a typical laptop screen.
output HEADLESS-1 {
    mode 1920x1080
    position 0 0
}

# Disable focus follows mouse — we have no mouse.
focus_follows_mouse no
